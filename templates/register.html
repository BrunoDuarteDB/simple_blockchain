<!DOCTYPE html>
<html>
<body>
    <h2>Cadastro de Novo Usuário</h2>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p style="color: orange;"><b>⚠️ {{ message }}</b></p>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form action="/register" method="POST">
        <input type="text" name="username" placeholder="Nome de usuário" required><br><br>
        <input type="password" name="password" placeholder="Senha Forte" required><br><br>
        <button type="submit">Cadastrar e Gerar TOTP</button>
    </form>
    <br>
    <a href="/">Voltar para Login</a>
</body>
</html>
