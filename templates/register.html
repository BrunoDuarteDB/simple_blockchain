<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Mini-Blockchain</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body style="text-align: center; padding-top: 50px;" class="bg-light">
    <h2>Cadastro de Novo Usuário</h2>
    
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p style="color: orange;"><b>⚠️ {{ message }}</b></p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="mt-4">
        <form action="/register" method="POST" class="shadow-sm bg-white" style="border: 1px solid #ccc; display: inline-block; padding: 30px; border-radius: 8px;">
            <input type="text" name="username" class="form-control mb-3" placeholder="Nome de usuário" required style="width: 300px;">
            <input type="password" name="password" class="form-control mb-3" placeholder="Senha Forte" required style="width: 300px;">
            <button type="submit" class="btn btn-success w-100">Cadastrar e Gerar TOTP</button>
        </form>
    </div>
    
    <div class="mt-3">
        <a href="/" class="btn btn-link">Já tem conta? Volte para o Login</a>
    </div>
</body>
</html>
