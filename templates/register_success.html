<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sucesso - Mini-Blockchain</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 text-center">
            <h2 class="text-success">✅ Usuário Cadastrado!</h2>
            <p class="mt-3">Bem-vindo, <strong>{{ user }}</strong>.</p>

            <div class="text-center">
                <p>Escaneie este QR Code no seu app de autenticação:</p>
                <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code TOTP" style="width: 200px;">
                <p class="mt-2">Ou digite manualmente: <code>{{ secret }}</code></p>
            </div>

            <p class="text-muted small">
                Este segredo será usado para calcular $TOTP = HMAC(K, T)$ a cada tentativa de login.
            </p>

            <div class="mt-4">
                <a href="/" class="btn btn-primary">Ir para o Login</a>
            </div>
        </div>
    </div>
</body>
</html>
