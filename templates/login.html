<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Mini-Blockchain</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body style="text-align: center; padding-top: 50px;" class="bg-light">
    <h2>Login Mini-Blockchain</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p style="color: red;"><b>⚠️ {{ message }}</b></p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="d-flex justify-content-center">
        <form action="/login" method="POST" autocomplete="off" class="shadow p-4 bg-white rounded" style="width: 380px;">
            <!-- autocomplete="new-password" costuma enganar o Bitwarden para ele não sugerir nada -->
            <input type="text" name="username" class="form-control mb-3" placeholder="Usuário" required autocomplete="off">
            <input type="password" name="password" class="form-control mb-3" placeholder="Senha" required autocomplete="new-password">
            <input type="text" name="totp" class="form-control mb-3" placeholder="Código TOTP (6 dígitos)" required autocomplete="off">
            <button type="submit" class="btn btn-primary w-100">Entrar no Sistema</button>
        </form>
    </div>
    <p class="mt-3">Não tem conta? <a href="/register" class="btn btn-link">Cadastre-se aqui</a></p>
</body>
</html>
