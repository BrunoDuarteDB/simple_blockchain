<!DOCTYPE html>
<html>
<body style="text-align: center; padding-top: 50px;">
    <h2>Login Mini-Blockchain</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p style="color: red;"><b>⚠️ {{ message }}</b></p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/login" method="POST" style="border: 1px solid #ccc; display: inline-block; padding: 20px;">
        <input type="text" name="username" placeholder="Usuário" required><br><br>
        <input type="password" name="password" placeholder="Senha" required><br><br>
        <input type="text" name="totp" placeholder="Código TOTP (6 dígitos)" required><br><br>
        <button type="submit">Entrar no Sistema</button>
    </form>
    <p>Não tem conta? <a href="/register">Cadastre-se aqui</a></p>
</body>
</html>
